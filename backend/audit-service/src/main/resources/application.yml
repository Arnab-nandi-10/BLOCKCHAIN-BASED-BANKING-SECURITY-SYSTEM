##############################################################################
#  Audit Service – Spring Boot Application Configuration
#  Port: 8085
##############################################################################

server:
  port: 8085
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain
    min-response-size: 1024
  error:
    include-message: never          # never leak internal exception messages to clients
    include-stacktrace: never

# ── Application identity ──────────────────────────────────────────────────────
spring:
  application:
    name: audit-service

  # ── Data source (PostgreSQL) ──────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:bbss_audit}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: AuditHikariPool
      maximum-pool-size: 15
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
      connection-test-query: SELECT 1

  # ── JPA / Hibernate ────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate            # Flyway owns the schema; Hibernate only validates
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 25
          order_inserts: true
          order_updates: true
        cache:
          use_second_level_cache: false
          use_query_cache: false

  # ── Flyway ────────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true
    out-of-order: false

  # ── Kafka ─────────────────────────────────────────────────────────────────
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: audit-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      max-poll-records: 500
    producer:
      acks: all
      retries: 3
    properties:
      # Security (override for SASL/SSL in production)
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}

  # ── Jackson ───────────────────────────────────────────────────────────────
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

# ── JWT ───────────────────────────────────────────────────────────────────────
# Secret must be a Base64-encoded HMAC-SHA256 key (≥ 256 bits / 32 bytes raw).
# Override via the JWT_SECRET environment variable in every deployed environment.
jwt:
  secret: ${JWT_SECRET:YWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXoxMjM0NTY3ODkwYWJjZGVmZ2hpamtsbW5vcHFyc3Q=}
  expiration-ms: 900000

# ── Resilience4j Circuit Breaker ──────────────────────────────────────────────
resilience4j:
  circuitbreaker:
    instances:
      blockchainClient:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50               # Higher than blockchain-service (audit less critical)
        wait-duration-in-open-state: 30s         # Longer wait (blockchain recovery takes time)
        slow-call-duration-threshold: 25s        # Blockchain REST calls including Fabric operations
        slow-call-rate-threshold: 80
        permitted-number-of-calls-in-half-open-state: 3
        record-exceptions:
          - java.net.ConnectException
          - java.net.SocketTimeoutException
          - org.springframework.web.client.ResourceAccessException
          - feign.RetryableException
        ignore-exceptions:
          - java.lang.IllegalArgumentException
  timelimiter:
    instances:
      blockchainClient:
        timeout-duration: 25s                    # Align with slow call threshold
  bulkhead:
    instances:
      blockchainClient:
        max-concurrent-calls: 10                 # Higher than blockchain-service (REST not gRPC)
        max-wait-duration: 5s

# ── Service URLs ──────────────────────────────────────────────────────────────
services:
  blockchain-service:
    url: ${BLOCKCHAIN_SERVICE_URL:http://blockchain-service:8084}
    internal-token: ${BLOCKCHAIN_SERVICE_INTERNAL_TOKEN:${INTERNAL_SERVICE_TOKEN:bbss-internal-service-token}}

# ── OpenFeign ────────────────────────────────────────────────────────────────
feign:
  client:
    config:
      default:
        connect-timeout: 5000
        read-timeout: 15000
        logger-level: BASIC
      blockchain-service:
        connect-timeout: 5000
        read-timeout: 20000
  compression:
    request:
      enabled: true
    response:
      enabled: true

# ── Actuator ──────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
  health:
    circuitbreakers:
      enabled: true
  info:
    env:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      environment: ${ENVIRONMENT:local}
  tracing:
    sampling:
      probability: 1.0  # 100% trace sampling for development
  zipkin:
    base-url: ${ZIPKIN_BASE_URL:http://jaeger:9411}
    tracing:
      endpoint: ${ZIPKIN_BASE_URL:http://jaeger:9411}/api/v2/spans

# ── OpenAPI / Swagger UI ──────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    root: WARN
    com.bbss.audit: INFO
    org.springframework.security: WARN
    org.springframework.kafka: WARN
    org.hibernate.SQL: WARN
    org.flywaydb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId}/%X{spanId}] %logger{36} - %msg%n"
