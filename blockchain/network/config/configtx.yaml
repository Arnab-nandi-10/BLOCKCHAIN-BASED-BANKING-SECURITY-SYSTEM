# ---------------------------------------------------------------------------
# configtx.yaml — Hyperledger Fabric channel configuration for Civic Savings network
#
# Used by configtxgen to produce:
#   - The orderer genesis block  (profile: TwoOrgsOrdererGenesis)
#   - The channel creation tx    (profile: TwoOrgsChannel)
#   - Anchor peer update txs     (profile: TwoOrgsChannel, -asOrg flag)
#
# MSP directories are resolved relative to this file's location at
# network/config/.  The actual certificate material is generated by
# cryptogen using crypto-config.yaml.
# ---------------------------------------------------------------------------

---
Organizations:

  # ---------------------------------------------------------------------------
  # OrdererOrg — the solo orderer for the Civic Savings development network
  # ---------------------------------------------------------------------------
  - &OrdererOrg
    Name: OrdererOrg
    ID: OrdererMSP
    MSPDir: ../organizations/ordererOrganizations/orderer.bbss.com/msp

    Policies:
      Readers:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"
      Writers:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"
      Admins:
        Type: Signature
        Rule: "OR('OrdererMSP.admin')"
      # Orderer nodes require the BlockValidation policy for gossiping
      BlockValidation:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"

  # ---------------------------------------------------------------------------
  # Org1 — Bank Alpha
  # ---------------------------------------------------------------------------
  - &Org1
    Name: Org1MSP
    ID: Org1MSP
    MSPDir: ../organizations/peerOrganizations/org1.bbss.com/msp

    Policies:
      Readers:
        Type: Signature
        Rule: "OR('Org1MSP.admin', 'Org1MSP.peer', 'Org1MSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('Org1MSP.admin', 'Org1MSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('Org1MSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('Org1MSP.peer')"

    # Anchor peer: used by the gossip protocol for cross-org communication
    AnchorPeers:
      - Host: peer0.org1.bbss.com
        Port: 7051

  # ---------------------------------------------------------------------------
  # Org2 — Bank Beta
  # ---------------------------------------------------------------------------
  - &Org2
    Name: Org2MSP
    ID: Org2MSP
    MSPDir: ../organizations/peerOrganizations/org2.bbss.com/msp

    Policies:
      Readers:
        Type: Signature
        Rule: "OR('Org2MSP.admin', 'Org2MSP.peer', 'Org2MSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('Org2MSP.admin', 'Org2MSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('Org2MSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('Org2MSP.peer')"

    AnchorPeers:
      - Host: peer0.org2.bbss.com
        Port: 9051

# ---------------------------------------------------------------------------
# Capabilities — feature flags that gate which Fabric versions are required
# ---------------------------------------------------------------------------
Capabilities:

  Channel: &ChannelCapabilities
    V2_0: true

  Orderer: &OrdererCapabilities
    V2_0: true

  Application: &ApplicationCapabilities
    V2_0: true

# ---------------------------------------------------------------------------
# Application — default policy and capability anchors for application channels
# ---------------------------------------------------------------------------
Application: &ApplicationDefaults

  Organizations:

  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
    LifecycleEndorsement:
      Type: ImplicitMeta
      Rule: "MAJORITY Endorsement"
    Endorsement:
      Type: ImplicitMeta
      Rule: "MAJORITY Endorsement"

  Capabilities:
    <<: *ApplicationCapabilities

# ---------------------------------------------------------------------------
# Orderer — default configuration for the Civic Savings solo orderer
# ---------------------------------------------------------------------------
Orderer: &OrdererDefaults

  # Solo is appropriate for development; switch to etcdraft for production.
  OrdererType: solo

  Addresses:
    - orderer.bbss.com:7050

  # Time the orderer waits to build a block even if MaxMessageCount is not
  # reached, ensuring low-latency commits during sparse transaction periods.
  BatchTimeout: 2s

  BatchSize:
    # Maximum number of transactions allowed in a single block
    MaxMessageCount: 10
    # Hard upper limit on block byte size
    AbsoluteMaxBytes: 99 MB
    # Target block size; orderer cuts a block when this is exceeded
    PreferredMaxBytes: 512 KB

  Organizations:

  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
    BlockValidation:
      Type: ImplicitMeta
      Rule: "ANY Writers"

  Capabilities:
    <<: *OrdererCapabilities

# ---------------------------------------------------------------------------
# Channel — default policy anchors shared between system and app channels
# ---------------------------------------------------------------------------
Channel: &ChannelDefaults

  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"

  Capabilities:
    <<: *ChannelCapabilities

# ---------------------------------------------------------------------------
# Profiles — named configurations consumed by configtxgen
# ---------------------------------------------------------------------------
Profiles:

  # Used to generate the orderer genesis block for the system channel.
  TwoOrgsOrdererGenesis:
    <<: *ChannelDefaults
    Orderer:
      <<: *OrdererDefaults
      Organizations:
        - *OrdererOrg
      Capabilities:
        <<: *OrdererCapabilities
    Consortiums:
      BbssConsortium:
        Organizations:
          - *Org1
          - *Org2

  # Used to create the bbss-channel application channel.
  TwoOrgsChannel:
    Consortium: BbssConsortium
    <<: *ChannelDefaults
    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *Org1
        - *Org2
      Capabilities:
        <<: *ApplicationCapabilities
