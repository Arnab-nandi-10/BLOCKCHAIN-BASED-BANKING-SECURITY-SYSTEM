# ---------------------------------------------------------------------------
# docker-compose-fabric.yml
# Hyperledger Fabric 2.5 network for BBSS (Blockchain Banking Security System)
#
# Topology:
#   - 1 Solo Orderer  (orderer.bbss.com : 7050)
#   - 4 Peers across 2 organisations, each backed by a dedicated CouchDB
#       peer0.org1  :7051  — couchdb0 :5984
#       peer1.org1  :8051  — couchdb1 :6984
#       peer0.org2  :9051  — couchdb2 :7984
#       peer1.org2  :10051 — couchdb3 :8984
#   - 2 Fabric CA servers (one per org)
#       ca.org1     :7054
#       ca.org2     :8054
#
# Prerequisites:
#   - Run network/scripts/network-up.sh to generate crypto material and
#     channel artifacts before starting this compose file.
# ---------------------------------------------------------------------------

version: '3.8'

# ---------------------------------------------------------------------------
# Named volumes — persistent storage across container restarts
# ---------------------------------------------------------------------------
volumes:
  orderer.bbss.com:
  peer0.org1.bbss.com:
  peer1.org1.bbss.com:
  peer0.org2.bbss.com:
  peer1.org2.bbss.com:
  couchdb0:
  couchdb1:
  couchdb2:
  couchdb3:

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  bbss-fabric-network:
    name: bbss-fabric-network
    driver: bridge

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------
services:

  # -------------------------------------------------------------------------
  # Orderer
  # -------------------------------------------------------------------------
  orderer.bbss.com:
    container_name: orderer.bbss.com
    image: hyperledger/fabric-orderer:2.5
    labels:
      service: hyperledger-fabric
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      # TLS
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      # Genesis block
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=file
      - ORDERER_GENERAL_BOOTSTRAPFILE=/var/hyperledger/orderer/orderer.genesis.block
      # Cluster (required even for solo to silence warnings in 2.5)
      - ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_CLUSTER_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      # Operations
      - ORDERER_OPERATIONS_LISTENADDRESS=0.0.0.0:9443
      - ORDERER_METRICS_PROVIDER=prometheus
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric
    command: orderer
    ports:
      - "7050:7050"
      - "9443:9443"
    volumes:
      - ../channel-artifacts/genesis.block:/var/hyperledger/orderer/orderer.genesis.block
      - ../organizations/ordererOrganizations/orderer.bbss.com/orderers/orderer.bbss.com/msp:/var/hyperledger/orderer/msp
      - ../organizations/ordererOrganizations/orderer.bbss.com/orderers/orderer.bbss.com/tls:/var/hyperledger/orderer/tls
      - orderer.bbss.com:/var/hyperledger/production/orderer
    networks:
      - bbss-fabric-network

  # -------------------------------------------------------------------------
  # CouchDB instances (one per peer)
  # -------------------------------------------------------------------------
  couchdb0:
    container_name: couchdb0
    image: couchdb:3.3
    labels:
      service: hyperledger-fabric
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - "5984:5984"
    volumes:
      - couchdb0:/opt/couchdb/data
    networks:
      - bbss-fabric-network

  couchdb1:
    container_name: couchdb1
    image: couchdb:3.3
    labels:
      service: hyperledger-fabric
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - "6984:5984"
    volumes:
      - couchdb1:/opt/couchdb/data
    networks:
      - bbss-fabric-network

  couchdb2:
    container_name: couchdb2
    image: couchdb:3.3
    labels:
      service: hyperledger-fabric
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - "7984:5984"
    volumes:
      - couchdb2:/opt/couchdb/data
    networks:
      - bbss-fabric-network

  couchdb3:
    container_name: couchdb3
    image: couchdb:3.3
    labels:
      service: hyperledger-fabric
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - "8984:5984"
    volumes:
      - couchdb3:/opt/couchdb/data
    networks:
      - bbss-fabric-network

  # -------------------------------------------------------------------------
  # Org1 peers
  # -------------------------------------------------------------------------
  peer0.org1.bbss.com:
    container_name: peer0.org1.bbss.com
    image: hyperledger/fabric-peer:2.5
    labels:
      service: hyperledger-fabric
    environment:
      # Generic peer settings
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=bbss-fabric-network
      - FABRIC_LOGGING_SPEC=INFO
      # TLS
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      # Peer identity
      - CORE_PEER_ID=peer0.org1.bbss.com
      - CORE_PEER_ADDRESS=peer0.org1.bbss.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.org1.bbss.com:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      # Gossip
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer1.org1.bbss.com:8051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.org1.bbss.com:7051
      - CORE_PEER_GOSSIP_USELEADERELECTION=true
      - CORE_PEER_GOSSIP_ORGLEADER=false
      # MSP
      - CORE_PEER_LOCALMSPID=Org1MSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      # CouchDB state database
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb0:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
      # Operations
      - CORE_OPERATIONS_LISTENADDRESS=0.0.0.0:9444
      - CORE_METRICS_PROVIDER=prometheus
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: peer node start
    ports:
      - "7051:7051"
      - "9444:9444"
    depends_on:
      - couchdb0
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ../organizations/peerOrganizations/org1.bbss.com/peers/peer0.org1.bbss.com/msp:/etc/hyperledger/fabric/msp
      - ../organizations/peerOrganizations/org1.bbss.com/peers/peer0.org1.bbss.com/tls:/etc/hyperledger/fabric/tls
      - peer0.org1.bbss.com:/var/hyperledger/production
    networks:
      - bbss-fabric-network

  peer1.org1.bbss.com:
    container_name: peer1.org1.bbss.com
    image: hyperledger/fabric-peer:2.5
    labels:
      service: hyperledger-fabric
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=bbss-fabric-network
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer1.org1.bbss.com
      - CORE_PEER_ADDRESS=peer1.org1.bbss.com:8051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:8051
      - CORE_PEER_CHAINCODEADDRESS=peer1.org1.bbss.com:8052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:8052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.org1.bbss.com:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer1.org1.bbss.com:8051
      - CORE_PEER_GOSSIP_USELEADERELECTION=true
      - CORE_PEER_GOSSIP_ORGLEADER=false
      - CORE_PEER_LOCALMSPID=Org1MSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb1:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
      - CORE_OPERATIONS_LISTENADDRESS=0.0.0.0:9445
      - CORE_METRICS_PROVIDER=prometheus
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: peer node start
    ports:
      - "8051:8051"
      - "9445:9445"
    depends_on:
      - couchdb1
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ../organizations/peerOrganizations/org1.bbss.com/peers/peer1.org1.bbss.com/msp:/etc/hyperledger/fabric/msp
      - ../organizations/peerOrganizations/org1.bbss.com/peers/peer1.org1.bbss.com/tls:/etc/hyperledger/fabric/tls
      - peer1.org1.bbss.com:/var/hyperledger/production
    networks:
      - bbss-fabric-network

  # -------------------------------------------------------------------------
  # Org2 peers
  # -------------------------------------------------------------------------
  peer0.org2.bbss.com:
    container_name: peer0.org2.bbss.com
    image: hyperledger/fabric-peer:2.5
    labels:
      service: hyperledger-fabric
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=bbss-fabric-network
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.org2.bbss.com
      - CORE_PEER_ADDRESS=peer0.org2.bbss.com:9051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:9051
      - CORE_PEER_CHAINCODEADDRESS=peer0.org2.bbss.com:9052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:9052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer1.org2.bbss.com:10051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.org2.bbss.com:9051
      - CORE_PEER_GOSSIP_USELEADERELECTION=true
      - CORE_PEER_GOSSIP_ORGLEADER=false
      - CORE_PEER_LOCALMSPID=Org2MSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb2:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
      - CORE_OPERATIONS_LISTENADDRESS=0.0.0.0:9446
      - CORE_METRICS_PROVIDER=prometheus
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: peer node start
    ports:
      - "9051:9051"
      - "9446:9446"
    depends_on:
      - couchdb2
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ../organizations/peerOrganizations/org2.bbss.com/peers/peer0.org2.bbss.com/msp:/etc/hyperledger/fabric/msp
      - ../organizations/peerOrganizations/org2.bbss.com/peers/peer0.org2.bbss.com/tls:/etc/hyperledger/fabric/tls
      - peer0.org2.bbss.com:/var/hyperledger/production
    networks:
      - bbss-fabric-network

  peer1.org2.bbss.com:
    container_name: peer1.org2.bbss.com
    image: hyperledger/fabric-peer:2.5
    labels:
      service: hyperledger-fabric
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=bbss-fabric-network
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer1.org2.bbss.com
      - CORE_PEER_ADDRESS=peer1.org2.bbss.com:10051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:10051
      - CORE_PEER_CHAINCODEADDRESS=peer1.org2.bbss.com:10052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:10052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.org2.bbss.com:9051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer1.org2.bbss.com:10051
      - CORE_PEER_GOSSIP_USELEADERELECTION=true
      - CORE_PEER_GOSSIP_ORGLEADER=false
      - CORE_PEER_LOCALMSPID=Org2MSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb3:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
      - CORE_OPERATIONS_LISTENADDRESS=0.0.0.0:9447
      - CORE_METRICS_PROVIDER=prometheus
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: peer node start
    ports:
      - "10051:10051"
      - "9447:9447"
    depends_on:
      - couchdb3
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ../organizations/peerOrganizations/org2.bbss.com/peers/peer1.org2.bbss.com/msp:/etc/hyperledger/fabric/msp
      - ../organizations/peerOrganizations/org2.bbss.com/peers/peer1.org2.bbss.com/tls:/etc/hyperledger/fabric/tls
      - peer1.org2.bbss.com:/var/hyperledger/production
    networks:
      - bbss-fabric-network

  # -------------------------------------------------------------------------
  # Fabric CA — one per organisation
  # -------------------------------------------------------------------------
  ca.org1.bbss.com:
    container_name: ca.org1.bbss.com
    image: hyperledger/fabric-ca:1.5
    labels:
      service: hyperledger-fabric
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca.org1.bbss.com
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=7054
      - FABRIC_CA_SERVER_OPERATIONS_LISTENADDRESS=0.0.0.0:17054
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    ports:
      - "7054:7054"
      - "17054:17054"
    volumes:
      - ../organizations/fabric-ca/org1:/etc/hyperledger/fabric-ca-server
    networks:
      - bbss-fabric-network

  ca.org2.bbss.com:
    container_name: ca.org2.bbss.com
    image: hyperledger/fabric-ca:1.5
    labels:
      service: hyperledger-fabric
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca.org2.bbss.com
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=8054
      - FABRIC_CA_SERVER_OPERATIONS_LISTENADDRESS=0.0.0.0:18054
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    ports:
      - "8054:8054"
      - "18054:18054"
    volumes:
      - ../organizations/fabric-ca/org2:/etc/hyperledger/fabric-ca-server
    networks:
      - bbss-fabric-network
